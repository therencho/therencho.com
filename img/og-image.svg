    <circle cx="26" cy="0" r="8" fill="#7857FF" fill-opacity="0.55"/>
    <circle cx="52" cy="0" r="8" fill="#7857FF" fill-opacity="0.3"/>
    <text x="86" y="7" font-family="Menlo, Consolas, monospace" font-size="24" fill="#9D86FF" letter-spacing="1">rencho@tech:~$ therencho.com</text>
  </g>

