      <stop offset="0" stop-color="#1b2030"/>
      <stop offset="1" stop-color="#10161a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9D86FF"/>
      <stop offset="1" stop-color="#7857FF"/>
